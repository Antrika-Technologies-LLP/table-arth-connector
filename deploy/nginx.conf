# Round-robin LB across control-plane instances. No sticky sessions required:
# the control plane forwards queries to whichever instance holds the socket.
# The WebSocket upgrade headers and long read timeout are the important bits.
events {}

http {
  upstream control {
    server control-a:8080;
    server control-b:8080;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 8080;

    location / {
      proxy_pass http://control;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      # Keep long-lived agent tunnels alive well past nginx's 60s default.
      proxy_read_timeout  3600s;
      proxy_send_timeout  3600s;
    }
  }
}
